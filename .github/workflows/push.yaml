on:
  push:
    branches:
      - master
      - main

name: CI

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.9.2
      - name: Install Melos
        run: dart pub global activate melos
      - name: Bootstrap
        run: |
          dart pub get
          melos bootstrap
      - name: Check formatting
        run: dart format --set-exit-if-changed packages/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.9.2
      - name: Install Melos
        run: dart pub global activate melos
      - name: Bootstrap
        run: |
          dart pub get
          melos bootstrap
      - name: Test
        run: melos run test

  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.9.2
      - name: Install Melos
        run: dart pub global activate melos
      - name: Bootstrap
        run: |
          dart pub get
          melos bootstrap
      - name: Analyze
        run: melos run analyze

  deploy:
    needs:
      - lint
      - test
      - analyze
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.9.2
      - name: Install Melos
        run: dart pub global activate melos
      - name: Bootstrap
        run: |
          dart pub get
          melos bootstrap
      - name: Publish to pub.dev
        run: |
          mkdir -p ~/.config/dart
          echo '${{ secrets.PUB_CREDENTIALS }}' > ~/.config/dart/pub-credentials.json
          cd packages/dartpollo_annotation && dart pub publish --force
          cd ../../packages/dartpollo && dart pub publish --force
          cd ../../packages/dartpollo_generator && dart pub publish --force
