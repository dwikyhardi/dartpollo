name: dartpollo_generator
version: 0.1.0

description: Code generator for the dartpollo GraphQL client. Builds Dart types from GraphQL schemas and queries.
repository: https://github.com/dwikyhardi/dartpollo
issue_tracker: https://github.com/dwikyhardi/dartpollo/issues
homepage: https://github.com/dwikyhardi/dartpollo

topics:
  - graphql
  - codegen
  - build-runner

environment:
  sdk: ^3.9.0

resolution: workspace

dependencies:
  build: ^4.0.5
  build_config: ^1.3.0
  code_builder: ^4.11.1
  collection: ^1.19.1
  crypto: ^3.0.7
  dart_style: ^3.1.3
  dartpollo_annotation: ^0.1.0
  equatable: ^2.0.8
  glob: ^2.1.3
  gql: ^1.0.1
  gql_code_builder: ^0.15.1
  json_annotation: ^4.11.0
  meta: ^1.18.2
  path: ^1.9.1
  pub_semver: ^2.2.0
  recase: ^4.1.0
  source_gen: ^4.2.2
  yaml: ^3.1.3

dev_dependencies:
  args: ^2.7.0
  build_runner: ^2.13.1
  build_test: ^3.5.12
  json_serializable: ^6.13.0
  lints: ^6.0.0
  logging: ^1.3.0
  mocktail: ^1.0.4
  pedantic_mono: ^1.34.0
  test: ^1.31.0
