name: dartpollo
version: 0.1.0

description: Build dart types from GraphQL schemas and queries (using Introspection Query).
homepage: https://github.com/dwikyhardi/dartpollo

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  build_config: ^1.1.2
  code_builder: ^4.10.1
  build: ^2.4.2
  collection: ^1.19.1
  crypto: ^3.0.3
  dart_style: ^3.0.1
  equatable: ^2.0.7
  glob: ^2.1.3
  gql_code_builder: ^0.14.0
  gql_dedupe_link: ^2.0.4-alpha+1715521079596
  gql_exec: ^1.1.1-alpha+1699813812660
  gql_http_link: ^1.1.0
  gql_link: ^1.0.1-alpha+1730759315378
  gql: ^1.0.1-alpha+1730759315362
  http: ^1.3.0
  json_annotation: ^4.9.0
  path: ^1.9.1
  pub_semver: ^2.1.5
  recase: ^4.1.0
  source_gen: ^2.0.0
  yaml: ^3.1.3

dev_dependencies:
  args: ^2.6.0
  build_runner: ^2.4.15
  build_test: ^2.2.3
  build_resolvers: ^2.4.4
  json_serializable: ^6.9.4
  logging: ^1.3.0
  lints: ^5.1.1
  mocktail: ^1.0.4
  test: ^1.25.15